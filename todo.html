<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium To-Do List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:450px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 10px white;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.add-btn{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.add-btn:hover{
    transform:scale(1.05);
}

#taskCount{
    color:white;
    margin-top:15px;
    text-align:center;
}

ul{
    margin-top:20px;
}

li{
    list-style:none;
    background:rgba(255,255,255,0.15);
    color:white;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

li:hover{
    transform:translateX(5px);
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.task-buttons button{
    margin-left:5px;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

.complete-btn{
    background:#2196f3;
    color:white;
}

.delete-btn{
    background:#ff1744;
    color:white;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    padding:12px;
    border-radius:20px;
    transition:0.3s;
}

.back:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Premium To-Do List</h1>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter a task...">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<p id="taskCount">Tasks: 0</p>

<ul id="taskList"></ul>

<a href="index.html" class="back">Back to Portfolio</a>

</div>

<script>

let count = 0;

function addTask(){

    let input = document.getElementById("taskInput");

    let taskText = input.value.trim();

    if(taskText === "") return;

    let li = document.createElement("li");

    li.innerHTML = `
        <span>${taskText}</span>

        <div class="task-buttons">

        <button class="complete-btn"
        onclick="toggleComplete(this)">
        ✓
        </button>

        <button class="delete-btn"
        onclick="deleteTask(this)">
        ✕
        </button>

        </div>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";

    count++;

    updateCount();
}

function toggleComplete(button){

    let task = button.parentElement.parentElement;

    task.classList.toggle("completed");
}

function deleteTask(button){

    let task = button.parentElement.parentElement;

    task.remove();

    count--;

    updateCount();
}

function updateCount(){

    document.getElementById("taskCount").innerHTML =
    "Tasks: " + count;
}

</script>

</body>
</html>
