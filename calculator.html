<!doctype html>
<html>
<head>
<title>Calculator</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  }

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    font-size:18px;
    transition:all 0.3s ease;
    box-shadow:0 0 15px rgba(0,198,255,0.5);
}

.btn:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 0 25px rgba(0,198,255,0.9);
    background:linear-gradient(45deg,#00e5ff,#0099ff);
}

.btn:active{
    transform:scale(0.95);
}
.operator{
  background:orange;
  color:white;
  }

#display{
  width:260px;
  height:40px;
  font-size:20px;
  margin-bottom:10px;
  border-radius:10px;
  }

.calculator{
  box-shadow:0 0 25px rgba(255,255,255,0.3);
  }

button{
  width:60px;
  height:60px;
  font-size:20px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  }

button:hover{
  transition:0.3s;
  opacity:0.9;
  transform:scale(1.1);
  }

</style>

</head>
<body>

<h1>CALCULATOR</h1>

<div class="calculator">
<input type="text" id="display" readonly>

<br>

<button onclick="addToDisplay('7')">7</button>
<button onclick="addToDisplay('8')">8</button>
<button onclick="addToDisplay('9')">9</button>
<button class="operator" onclick="addToDisplay('+')">+</button>

<br>

<button onclick="addToDisplay('4')">4</button>
<button onclick="addToDisplay('5')">5</button>
<button onclick="addToDisplay('6')">6</button>
<button class="operator"onclick="addToDisplay('-')">-</button>

<br>

<button onclick="addToDisplay('1')">1</button>
<button onclick="addToDisplay('2')">2</button>
<button onclick="addToDisplay('3')">3</button>
<button class="operator"onclick="addToDisplay('*')">*</button>

<br>

<button onclick="addToDisplay('0')">0</button>
<button onclick="clearDisplay()">C</button>
<button onclick="calculate()">=</button>
<button class="operator"onclick="addToDisplay('/')">/</button><br><br>
<a href="index.html" class="btn">Back to Portfolio</a>
</div>
  

<script>
function addToDisplay(value){
  document.getElementById("display").value+=value;
  }

function clearDisplay(){
  document.getElementById("display").value="";
  }

function calculate(){
  let result = eval(document.getElementById("display").value);
  document.getElementById("display").value=result;
}
</script>
</body>
</html>
